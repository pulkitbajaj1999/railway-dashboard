# Security & Network Hardening
server_tokens off;
client_max_body_size 10M;
tcp_nopush on;
tcp_nodelay on;

# Timeout Protection (Prevents Slowloris attack)
# client_header_timeout   10s;
# client_body_timeout     10s;
# send_timeout            10s;
# keepalive_timeout       65s;
# reset_timedout_connection on;

# character set
charset utf-8;

# Gzip (As a fallback for API responses)
gzip on;
gzip_disable "msie6";
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_types 
    application/json 
    text/plain 
    application/xml 
    text/css 
    application/javascript;



server {
    listen 80;
    listen [::]:80;
    server_name _;

    # --- MODERN SECURITY HEADERS ---
    # Force HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking (Use SAMEORIGIN if you need to use iframes on your own site)
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Privacy-focused referrer logic
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Modern Content Security Policy
    # NOTE: Add your specific API domains to connect-src
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' *.railway.app;" always;

    # Disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;


    # returning permanent redirect to app1 
    location / {
        return 301 /portfolio/;
    }

    # ==========================================
    # APP 1 CONFIGURATION : PORTFOLIO
    # ==========================================
    location /portfolio {
        alias /usr/share/nginx/html/portfolio/;
        index index.html;
        access_log off;
        # Try finding the file, then folder, then fall back to portfolio's index
        try_files $uri $uri/ /portfolio/index.html;

        # Nesting Cache Rules specifically for App 1
        location ~* /portfolio/.*\.(?:manifest|appcache|html?|xml|json)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            try_files $uri =404;
        }

        # Feed
        location ~* /portfolio/.*\.(?:rss|atom)$ {
            expires 1h;
            add_header Cache-Control "public";
        }

        # Media: images, icons, video, audio, HTC
        location ~* /portfolio/.*\.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
            expires 1M;
            access_log off;
            add_header Cache-Control "public";
        }

        # CSS and Javascript
        location ~* /portfolio/.*\.(?:css|js)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public";
        }
    }

    # ==========================================
    # APP 2 CONFIGURATION : DOCKER-SCRAM
    # ==========================================
    location /docker-scram {
        alias /usr/share/nginx/html/docker-scram/;
        index index.html;
        access_log off;
        try_files $uri $uri/ /docker-scram/index.html;

        # Nested API block for App 2
        location /docker-scram/api/ {
            proxy_pass http://docker-scram:4000/;

            # Increase timeouts for long-running processes
            proxy_connect_timeout 90s;
            proxy_send_timeout    90s;
            proxy_read_timeout    90s;

            # Crucial for long responses: Disable buffering
            # This sends data to the client as soon as the backend produces it
            proxy_buffering off;
            
            # Ensure the connection stays alive
            proxy_socket_keepalive on;
        }

        # Nesting Cache Rules specifically for App 1
        location ~* /docker-scram/.*\.(?:manifest|appcache|html?|xml|json)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            try_files $uri =404;
        }

        # Feed
        location ~* /docker-scram/.*\.(?:rss|atom)$ {
            expires 1h;
            add_header Cache-Control "public";
        }

        # Media: images, icons, video, audio, HTC
        location ~* /docker-scram/.*\.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
            expires 1M;
            access_log off;
            add_header Cache-Control "public";
        }

        # CSS and Javascript
        location ~* /docker-scram/.*\.(?:css|js)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public";
        }
    }


    # ==========================================
    # APP 3 CONFIGURATION : CHESS
    # ==========================================
    location /chess {
        alias /usr/share/nginx/html/chess/;
        index index.html;
        access_log off;
        try_files $uri $uri/ /chess/index.html;

        # Nested API block for App 2
        location /chess/api/ {
            proxy_pass http://chess:8003/;

            # Increase timeouts for long-running processes
            proxy_connect_timeout 90s;
            proxy_send_timeout    90s;
            proxy_read_timeout    90s;

            # Crucial for long responses: Disable buffering
            # This sends data to the client as soon as the backend produces it
            proxy_buffering off;
            
            # Ensure the connection stays alive
            proxy_socket_keepalive on;
        }

        # Nested API block for App 2
        location /chess/api/socket.io/ {
            proxy_pass http://chess:8003/socket.io/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Critical: Ensure the Host header matches what Express expects
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Prevents Nginx from closing the connection too early
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            
            # Crucial for long responses: Disable buffering
            # This sends data to the client as soon as the backend produces it
            proxy_buffering off;
            
            # Ensure the connection stays alive
            proxy_socket_keepalive on;
        }

        # Nesting Cache Rules specifically for App 1
        location ~* /chess/.*\.(?:manifest|appcache|html?|xml|json)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            try_files $uri =404;
        }

        # Feed
        location ~* /chess/.*\.(?:rss|atom)$ {
            expires 1h;
            add_header Cache-Control "public";
        }

        # Media: images, icons, video, audio, HTC
        location ~* /chess/.*\.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
            expires 1M;
            access_log off;
            add_header Cache-Control "public";
        }

        # CSS and Javascript
        location ~* /chess/.*\.(?:css|js)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public";
        }
    }

    # ==========================================
    # APP 4 CONFIGURATION : MUSICWIRE
    # ==========================================
    location /musicwire {
        alias /usr/share/nginx/html/musicwire/;
        index index.html;
        access_log off;
        try_files $uri $uri/ /musicwire/index.html;

        # Nested API block for App 2
        location /musicwire/api/ {
            proxy_pass http://musicwire:8004/;

            # Increase timeouts for long-running processes
            proxy_connect_timeout 90s;
            proxy_send_timeout    90s;
            proxy_read_timeout    90s;

            # Crucial for long responses: Disable buffering
            # This sends data to the client as soon as the backend produces it
            proxy_buffering off;
            
            # Ensure the connection stays alive
            proxy_socket_keepalive on;
        }

        # Nesting Cache Rules specifically for App 1
        location ~* /musicwire/.*\.(?:manifest|appcache|html?|xml|json)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            try_files $uri =404;
        }

        # Feed
        location ~* /musicwire/.*\.(?:rss|atom)$ {
            expires 1h;
            add_header Cache-Control "public";
        }

        # Media: images, icons, video, audio, HTC
        location ~* /musicwire/.*\.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
            expires 1M;
            access_log off;
            add_header Cache-Control "public";
        }

        # CSS and Javascript
        location ~* /musicwire/.*\.(?:css|js)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public";
        }
    }
}